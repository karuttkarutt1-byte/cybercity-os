<!DOCTYPE html>
<html>
<body style="background:#0a0f1f;color:white;padding:20px;font-family:sans-serif;">

<h2>Settings</h2>

<label>
  <input type="checkbox" id="sound">
  Enable Sound
</label>

<script>
const sound = document.getElementById("sound");

sound.checked = localStorage.getItem("sound") === "true";

sound.onchange = () => {
  localStorage.setItem("sound", sound.checked);
};
</script>

</body>
</html>
