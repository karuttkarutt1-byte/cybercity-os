<!DOCTYPE html>
<html>
<body style="background:black;color:#0f0;font-family:monospace;padding:10px;">

<div id="log"></div>
<input id="cmd" autofocus placeholder="type command">

<script>
const log = document.getElementById("log");
const input = document.getElementById("cmd");

function print(t){
  log.innerHTML += "<div>> " + t + "</div>";
}

input.onkeydown = e=>{
  if(e.key==="Enter"){
    run(input.value);
    input.value="";
  }
};

function run(cmd){
  print(cmd);

  if(cmd==="help") print("open [url], clear");
  else if(cmd.startsWith("open ")) window.parent.openBrowser(cmd.split(" ")[1]);
  else if(cmd==="clear") log.innerHTML="";
}
</script>

</body>
</html>
