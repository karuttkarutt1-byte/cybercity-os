<!DOCTYPE html>
<html lang="en">
   <link rel="manifest" href="manifest.json">
   <link rel="icon" href="favicon.ico">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Moonlight Cybercity Engine v2.5</title>

<meta name="description" content="Cybercity learning + browsing engine with proxy tools and OS-style navigation.">
<meta name="theme-color" content="#070a12">

<meta name="credits" content="Inspired by Endis educational platform and proxy-based navigation systems">

<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;800&display=swap" rel="stylesheet">

<style>
/* =========================
   BASE THEME
========================= */

:root{
  --bg:#05070d;
  --panel:rgba(10,15,25,0.65);
  --accent:#6ee7ff;
  --accent2:#a78bfa;
  --text:#dbeafe;
  --muted:#93a4c7;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Figtree;}

body{
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* =========================
   CYBERCITY BACKGROUND
========================= */

#cityCanvas{
  position:fixed;
  inset:0;
  z-index:-3;
}

#fog{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(110,231,255,0.08), transparent 45%),
    radial-gradient(circle at 80% 80%, rgba(167,139,250,0.07), transparent 50%);
  filter: blur(20px);
  z-index:-2;
}

/* =========================
   HEADER
========================= */

header{
  display:flex;
  justify-content:space-between;
  padding:16px 24px;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,0.06);
}

nav a{
  margin-left:16px;
  color:var(--muted);
  text-decoration:none;
  font-weight:600;
}
nav a:hover{color:var(--accent);}

/* =========================
   MAIN LAYOUT
========================= */

main{
  padding:40px;
}

/* HERO */
.hero{
  text-align:center;
  margin-top:40px;
}

.hero h1{
  font-size:42px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p{
  color:var(--muted);
  margin-top:10px;
}

/* SEARCH */
.search{
  display:flex;
  max-width:700px;
  margin:30px auto;
  background:var(--panel);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;
  overflow:hidden;
}

.search input{
  flex:1;
  padding:14px;
  background:transparent;
  border:none;
  color:white;
  outline:none;
}

.search button{
  padding:0 16px;
  background:var(--accent);
  border:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
  margin-top:30px;
}

.card{
  background:var(--panel);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;
  padding:16px;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-4px);
  border-color:var(--accent);
}

/* =========================
   COMMAND PALETTE
========================= */

#cmd{
  position:fixed;
  top:20%;
  left:50%;
  transform:translateX(-50%);
  width:420px;
  background:#0a0f1f;
  border:1px solid var(--accent);
  display:none;
  padding:10px;
  z-index:999;
}

#cmd input{
  width:100%;
  padding:10px;
  background:none;
  border:none;
  color:white;
  outline:none;
}

/* =========================
   BROWSER WINDOW
========================= */

#browser{
  position:fixed;
  inset:40px;
  background:#0a0f1f;
  border:1px solid rgba(255,255,255,0.1);
  display:none;
  flex-direction:column;
  z-index:50;
}

.tabs{
  display:flex;
  gap:6px;
  padding:8px;
}

.tab{
  padding:4px 8px;
  border:1px solid rgba(255,255,255,0.2);
  cursor:pointer;
}

.tab.active{
  background:rgba(110,231,255,0.2);
}

iframe{
  flex:1;
  border:none;
}

/* =========================
   FOOTER
========================= */

footer{
  text-align:center;
  padding:30px;
  color:var(--muted);
  font-size:12px;
}

</style>
</head>

<body>

<canvas id="cityCanvas"></canvas>
<div id="fog"></div>

<header>
  <div><strong>MOONLIGHT ENGINE v2.5</strong></div>
  <nav>
    <a href="#" onclick="openBrowser()">Browser</a>
    <a href="#tools">Tools</a>
    <a href="#settings">Settings</a>
    <a href="#credits">Credits</a>
  </nav>
</header>

<main>

<div class="hero">
  <h1>Cybercity Learning Engine</h1>
  <p>Browse • Learn • Navigate • Control</p>
</div>

<form class="search" id="searchForm">
  <input id="search" placeholder="Search or enter URL...">
  <button>→</button>
</form>

<div class="grid">

<div class="card" onclick="openBrowser()">🌐 Browser</div>
<div class="card" onclick="cmdToggle()">⌨ Command</div>
<div class="card">📚 Tools</div>
<div class="card">⚙ Settings</div>

</div>

</main>

<!-- BROWSER -->
<div id="browser">
  <div class="tabs" id="tabs"></div>
  <iframe id="frame"></iframe>
</div>

<!-- COMMAND -->
<div id="cmd">
<input id="cmdInput" placeholder="open google.com">
</div>

<footer>
  © 2026 Moonlight Cybercity Engine · Inspired by Endis (proxy + learning UI concepts)
</footer>

<script>

/* =========================
   CYBERCITY SKYLINE
========================= */

const c = document.getElementById("cityCanvas");
const ctx = c.getContext("2d");

function resize(){
  c.width = innerWidth;
  c.height = innerHeight;
}
resize();
window.onresize = resize;

let buildings = Array.from({length:80}, ()=>({
  x:Math.random()*innerWidth,
  w:20+Math.random()*60,
  h:50+Math.random()*300
}));

function draw(){
  ctx.fillStyle="#05070d";
  ctx.fillRect(0,0,c.width,c.height);

  for(let b of buildings){
    ctx.fillStyle="rgba(110,231,255,0.08)";
    ctx.fillRect(b.x,c.height-b.h,b.w,b.h);
  }

  requestAnimationFrame(draw);
}
draw();

/* =========================
   SEARCH
========================= */

searchForm.onsubmit=e=>{
  e.preventDefault();
  openBrowser(search.value);
};

/* =========================
   BROWSER
========================= */

let tabs=[];

function openBrowser(url="https://example.com"){
  browser.style.display="flex";
  let id=Date.now();
  tabs.push({id,url});
  renderTabs();
  frame.src=url;
}

function renderTabs(){
  tabsEl.innerHTML="";
  tabs.forEach(t=>{
    let d=document.createElement("div");
    d.className="tab";
    d.innerText="tab";
    d.onclick=()=>frame.src=t.url;
    tabsEl.appendChild(d);
  });
}

/* =========================
   COMMAND
========================= */

function cmdToggle(){
  cmd.style.display="block";
  cmdInput.focus();
}

document.addEventListener("keydown",e=>{
  if(e.ctrlKey && e.key==="k") cmdToggle();
  if(e.key==="Escape") cmd.style.display="none";
});

cmdInput.onkeydown=e=>{
  if(e.key==="Enter"){
    let p=cmdInput.value.split(" ");
    if(p[0]==="open") openBrowser(p[1]);
    cmd.style.display="none";
  }
};

</script>

</body>
</html>
