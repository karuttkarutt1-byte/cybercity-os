<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Moonlight Cybercity</title>

<meta name="description" content="Cybercity learning + browsing engine">
<meta name="theme-color" content="#0b0f1a">
<meta name="credits" content="Inspired by Endis educational platform UI/UX concepts">

<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">Moonlight</div>

  <nav class="nav">
    <a class="active">Home</a>
    <a onclick="openApp('browser')">Browser</a>
    <a onclick="openApp('notes')">Tools</a>
    <a onclick="openApp('settings')">Settings</a>
  </nav>

  <div class="header-actions">
    ⚙
  </div>
</header>

<!-- MAIN -->
<main class="container">

  <!-- GREETING -->
  <div class="greeting">
    <p id="greetingText"></p>
    <h1>What do you want to explore?</h1>
  </div>

  <!-- SEARCH -->
  <form class="search-box" id="searchForm">
    <input id="search" placeholder="Search the web or enter a URL...">
    <button>→</button>
  </form>

  <!-- CARDS -->
  <div class="tools">

    <div class="tool featured" onclick="openApp('browser')">
      <div class="icon">🌐</div>
      <div>
        <h3>Browser</h3>
        <p>Search and explore securely</p>
      </div>
    </div>

    <div class="tool" onclick="openApp('notes')">
      <div class="icon">📝</div>
      <div>
        <h3>Notes</h3>
        <p>Save ideas and tasks</p>
      </div>
    </div>

    <div class="tool" onclick="openApp('terminal')">
      <div class="icon">⌨</div>
      <div>
        <h3>Terminal</h3>
        <p>Run commands</p>
      </div>
    </div>

    <div class="tool" onclick="openApp('settings')">
      <div class="icon">⚙</div>
      <div>
        <h3>Settings</h3>
        <p>Customize your system</p>
      </div>
    </div>

  </div>

</main>

<!-- APP WINDOW -->
<div id="browser" class="window">
  <div class="window-bar">
    <span id="window-title">App</span>
    <button onclick="closeWindow()">✕</button>
  </div>
  <iframe id="frame"></iframe>
</div>

<!-- FOOTER -->
<footer class="footer">
  Inspired by Endis (UI/UX concepts)
</footer>

<script src="engine.js"></script>

<script>
/* greeting */
const h = new Date().getHours();
const g = h < 12 ? "Good morning" : h < 17 ? "Good afternoon" : "Good evening";
document.getElementById("greetingText").textContent = g;

/* search */
searchForm.onsubmit = e => {
  e.preventDefault();

  const q = search.value.trim();
  if(!q) return;

  let url;
  try { url = new URL(q).href; }
  catch { url = "https://duckduckgo.com/?q=" + encodeURIComponent(q); }

  openApp("browser");
  frame.src = "apps/browser/index.html?url=" + encodeURIComponent(url);
};
</script>

</body>
</html>
