<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Moonlight Cybercity Engine</title>

<meta name="description" content="Cybercity OS-style learning and browsing engine">
<meta name="theme-color" content="#05070d">
<meta name="credits" content="Inspired by Endis educational platform and proxy-based navigation systems">

<link rel="icon" href="favicon.ico">
<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- =========================
     BACKGROUND
========================= -->
<canvas id="cityCanvas"></canvas>
<div id="fog"></div>

<!-- =========================
     BOOT SCREEN
========================= -->
<div id="boot">
  <h1>Booting Cybercity Engine...</h1>
</div>

<!-- =========================
     HEADER
========================= -->
<header>
  <div class="logo">
    🌙 CYBERCITY OS
  </div>

  <nav>
    <a onclick="openApp('browser')">Browser</a>
    <a onclick="openApp('terminal')">Terminal</a>
    <a onclick="openApp('notes')">Notes</a>
    <a onclick="openApp('settings')">Settings</a>
  </nav>
</header>

<!-- =========================
     MAIN UI
========================= -->
<main>

  <div class="hero">
    <h1>Moonlight Cybercity</h1>
    <p>Learn • Browse • Control • Explore</p>
  </div>

  <!-- SEARCH -->
  <form class="search" id="searchForm">
    <input id="search" placeholder="Search or enter URL...">
    <button>→</button>
  </form>

  <!-- APP GRID -->
  <div class="grid">

    <div class="card" onclick="openApp('browser')">
      <img src="assets/icons/browser.svg">
      <span>Browser</span>
    </div>

    <div class="card" onclick="openApp('terminal')">
      <img src="assets/icons/terminal.svg">
      <span>Terminal</span>
    </div>

    <div class="card" onclick="openApp('notes')">
      <img src="assets/icons/folder.svg">
      <span>Notes</span>
    </div>

    <div class="card" onclick="openApp('settings')">
      <img src="assets/icons/settings.svg">
      <span>Settings</span>
    </div>

  </div>

</main>

<!-- =========================
     APP WINDOW (OS STYLE)
========================= -->
<div id="browser">
  <div class="window-bar">
    <span id="window-title">App</span>
    <button onclick="closeWindow()">✕</button>
  </div>

  <iframe id="frame"></iframe>
</div>

<!-- =========================
     COMMAND PALETTE
========================= -->
<div id="cmd">
  <input id="cmdInput" placeholder="Type command (open google.com)">
</div>

<!-- =========================
     FOOTER
========================= -->
<footer>
  <p>
    © 2026 Moonlight Cybercity Engine  
    <br>
    Inspired by Endis (educational + proxy UI concepts)
  </p>
</footer>

<!-- =========================
     SCRIPTS
========================= -->
<script src="engine.js"></script>

<script>
/* =========================
   BOOT SCREEN
========================= */
window.addEventListener("load", () => {
  setTimeout(() => {
    document.getElementById("boot").style.display = "none";
  }, 1200);
});

/* =========================
   OPEN APP SYSTEM
========================= */
function openApp(app){
  const browser = document.getElementById("browser");
  const frame = document.getElementById("frame");
  const title = document.getElementById("window-title");

  browser.style.display = "flex";
  frame.src = "apps/" + app + "/index.html";

  title.textContent = app.toUpperCase();
}

/* CLOSE WINDOW */
function closeWindow(){
  document.getElementById("browser").style.display = "none";
}

/* =========================
   SEARCH HANDLER
========================= */
document.getElementById("searchForm").onsubmit = (e) => {
  e.preventDefault();

  const q = document.getElementById("search").value.trim();
  if(!q) return;

  let url;

  try {
    url = new URL(q).href;
  } catch {
    url = "https://duckduckgo.com/?q=" + encodeURIComponent(q);
  }

  openApp("browser");
  document.getElementById("frame").src =
    "apps/browser/index.html?url=" + encodeURIComponent(url);
};

/* =========================
   COMMAND PALETTE
========================= */
document.addEventListener("keydown", e => {
  if(e.ctrlKey && e.key === "k"){
    document.getElementById("cmd").style.display = "block";
    document.getElementById("cmdInput").focus();
  }

  if(e.key === "Escape"){
    document.getElementById("cmd").style.display = "none";
  }
});

document.getElementById("cmdInput").onkeydown = e => {
  if(e.key !== "Enter") return;

  const val = e.target.value;
  e.target.value = "";

  if(val.startsWith("open ")){
    openApp("browser");
    document.getElementById("frame").src =
      "apps/browser/index.html?url=" + encodeURIComponent(val.split(" ")[1]);
  }
};
</script>

</body>
</html>
